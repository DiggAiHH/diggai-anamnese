# ─────────────────────────────────────────────────────────────
#  DiggAi Backend — Fly.io Deploy-Config
#
#  Region: Frankfurt (fra) — DSGVO-konform
#  Hosting: Fly.io (formerly fly.io / superfly)
#  Image:   Multi-stage Dockerfile aus Repo-Root
#
#  Setup-Befehle:
#    flyctl auth login
#    flyctl launch --no-deploy --copy-config --name diggai-api --region fra
#    flyctl secrets set DATABASE_URL="postgres://...neon.tech/..."
#    flyctl secrets set JWT_SECRET="..." ENCRYPTION_KEY="..."
#    flyctl deploy
#
#  Custom-Domain (optional, für api.diggai.de):
#    flyctl certs add api.diggai.de
#    DNS-A-Record auf fly-IP setzen (flyctl ips list)
# ─────────────────────────────────────────────────────────────

app = "diggai-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  DEPLOYMENT_MODE = "CLOUD"
  # CORS auf Production-Frontend
  CORS_ORIGIN = "https://diggai.de,https://www.diggai.de,https://diggai-anamnese.netlify.app"
  # RabbitMQ optional — Agent-Core ist separater Service
  DISABLE_RABBITMQ = "1"
  # 2026-05-08 — Memory-Diet: 10 von 14 Background-Jobs deaktiviert (siehe server/index.ts).
  # Nur DSGVO/Security-Essentials laufen: cleanup, hardDelete, tokenCleanup, retention.
  # Reaktivieren via Setting auf "0" und redeployen, sobald Praxen-Last es erfordert.
  LOW_MEM_MODE = "1"
  # V8-Heap-Decke: Auf 512-MB-Fly-Machine ~360 MB für Old-Space, Rest für native + Prisma + FS.
  # Verhindert V8-Default-Heap (1500 MB+), der OOM-Killer triggert.
  NODE_OPTIONS = "--max-old-space-size=384"

[http_service]
  internal_port = 3001
  force_https = true
  # 2026-05-06: Cold-Start vermeiden — Maschine bleibt warm.
  # Patient-erste-Anfrage muss < 1s antworten, kein 5-15s Wake-Up.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "diggai_uploads"
  destination = "/app/uploads"
