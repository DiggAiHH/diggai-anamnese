# Docker Compose for Load Testing
# Includes K6, Grafana, and InfluxDB for comprehensive load testing

version: '3.8'

services:
  # K6 Load Testing Tool
  k6:
    image: grafana/k6:latest
    container_name: diggai-k6
    volumes:
      - ./tests/load:/tests
      - ./tests/load/results:/results
    command: run --out influxdb=http://influxdb:8086 /tests/api-load-test.js
    networks:
      - load-test-network
    depends_on:
      - influxdb
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6
      - BASE_URL=http://host.docker.internal:3001/api

  # InfluxDB for metrics storage
  influxdb:
    image: influxdb:1.8
    container_name: diggai-influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin123
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - load-test-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: diggai-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    networks:
      - load-test-network
    depends_on:
      - influxdb

  # Optional: Prometheus for additional metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: diggai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - load-test-network
    profiles:
      - advanced

  # Optional: Node Exporter for host metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: diggai-node-exporter
    ports:
      - "9100:9100"
    networks:
      - load-test-network
    profiles:
      - advanced

volumes:
  influxdb-data:
  grafana-data:
  prometheus-data:

networks:
  load-test-network:
    driver: bridge
