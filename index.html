<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="DiggAI Capture — Administrative Praxis-Anmelde- und Anliegen-Erfassungs-Plattform für deutsche Arztpraxen. Kein Medizinprodukt." />
  <meta name="robots" content="index, follow" />
  <!-- Open Graph -->
  <meta property="og:title" content="DiggAI Capture — Praxis-Anmelde-Plattform" />
  <meta property="og:description" content="DSGVO-konforme Anmelde- und Anliegen-Erfassung für Arztpraxen. Stammdaten, freie Anliegen-Beschreibung, mehrsprachig, AES-256-Verschlüsselung. Keine Diagnose, keine Triage, keine medizinische Bewertung." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://diggai.de" />
  <meta property="og:locale" content="de_DE" />
  <meta property="og:site_name" content="DiggAI" />
  <!-- Security — CSP is handled via Netlify HTTP headers (netlify.toml) to avoid dual-policy conflicts.
       Meta CSP removed: having both meta + header applies BOTH — meta blocked eval() (lottie-web)
       and blocked connect-src to api-takios.diggai.de. Netlify header alone is sufficient. -->
  <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(self), geolocation=()" />
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DiggAI" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <!-- Typography: Phase 2 Optimization for Elderly/Anxious Users -->
  <!-- Primary Font: Inter with RTL support via Noto Sans Arabic -->
  <!-- DNS prefetch + preconnect for API backend (reduces TCP handshake latency) -->
  <link rel="dns-prefetch" href="https://diggai-api.fly.dev" />
  <link rel="preconnect" href="https://diggai-api.fly.dev" crossorigin />
  <link rel="dns-prefetch" href="https://api.diggai.de" />
  <link rel="preconnect" href="https://api.diggai.de" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" fetchpriority="high" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <title>DiggAI Capture — Praxis-Anmeldung</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
