  <!-- Security — CSP is handled via Netlify HTTP headers (netlify.toml) to avoid dual-policy conflicts.
       Meta CSP removed: having both meta + header applies BOTH — meta blocked eval() (lottie-web)
       and blocked connect-src to api-takios.diggai.de. Netlify header alone is sufficient. -->
  <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(self), geolocation=()" />
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
