[build]
  command = "npm run build"
  publish = "dist"
  # functions disabled — backend runs on Docker VPS, not Netlify Functions
  functions = "netlify/no-functions-placeholder"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_SITE_ID = "aeb2a8e2-e8ac-47e0-a5bc-fef4df4aceaa"
  # Backend API URL — must match the VPS domain configured in docker/nginx.conf
  VITE_API_URL = "https://api-takios.diggai.de/api"

# ─── DSGVO/BSI Security Headers (Section 2.2) ───────────────
[[headers]]
  for = "/*"
  [headers.values]
    # HSTS — BSI TR-02102: 1 Jahr, includeSubDomains, preload
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Clickjacking-Schutz
    X-Frame-Options = "DENY"
    # MIME-Sniffing-Schutz
    X-Content-Type-Options = "nosniff"
    # Referrer-Policy — verhindert Datenleck über Referer-Header
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions-Policy — Kamera + Mikrofon für Videosprechstunde (self), Rest gesperrt
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=(), payment=()"
    # CSP — 'unsafe-eval' required for lottie-web (uses eval() for animation expressions)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' https://*.netlify.app wss://*.netlify.app https://api.diggai.de wss://api.diggai.de https://api-takios.diggai.de wss://api-takios.diggai.de; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    # XSS-Protection deaktiviert (CSP ist zuständig, alter Header kann Bugs verursachen)
    X-XSS-Protection = "0"
    # Cross-Origin-Embedder-Policy (credentialless allows external resources like Google Fonts)
    Cross-Origin-Embedder-Policy = "credentialless"
    # Cross-Origin-Opener-Policy
    Cross-Origin-Opener-Policy = "same-origin"
    # Cross-Origin-Resource-Policy
    Cross-Origin-Resource-Policy = "same-origin"

# Cache-Control für statische Assets (immutable hashes)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Kein Cache für HTML (SPA entry point)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
