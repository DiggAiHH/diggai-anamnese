[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# ─── DSGVO/BSI Security Headers (Section 2.2) ───────────────
[[headers]]
  for = "/*"
  [headers.values]
    # HSTS — BSI TR-02102: 1 Jahr, includeSubDomains, preload
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Clickjacking-Schutz
    X-Frame-Options = "DENY"
    # MIME-Sniffing-Schutz
    X-Content-Type-Options = "nosniff"
    # Referrer-Policy — verhindert Datenleck über Referer-Header
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions-Policy — Kamera nur self, Rest gesperrt
    Permissions-Policy = "camera=(self), microphone=(), geolocation=(), payment=()"
    # CSP — strikt, default-src self, frame-ancestors none
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://*.netlify.app wss://*.netlify.app; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    # XSS-Protection deaktiviert (CSP ist zuständig, alter Header kann Bugs verursachen)
    X-XSS-Protection = "0"
    # Cross-Origin-Embedder-Policy
    Cross-Origin-Embedder-Policy = "require-corp"
    # Cross-Origin-Opener-Policy
    Cross-Origin-Opener-Policy = "same-origin"
    # Cross-Origin-Resource-Policy
    Cross-Origin-Resource-Policy = "same-origin"

# Cache-Control für statische Assets (immutable hashes)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Kein Cache für HTML (SPA entry point)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
