version: '3.9'

services:
  # ─── Express Backend ─────────────────────────────────────
  app:
    build: .
    container_name: diggai-app
    ports:
      - "3001:3001"
    env_file: .env.production
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads
    networks:
      - diggai-network

  # ─── PostgreSQL 16 ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: diggai-postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: anamnese_prod
      POSTGRES_USER: diggai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diggai -d anamnese_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - diggai-network

  # ─── Redis 7 (Token Blacklist + Queue) ────────────────────
  redis:
    image: redis:7-alpine
    container_name: diggai-redis
    volumes:
      - redisdata:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - diggai-network

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: diggai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - diggai-network

  # ─── Modul 6: Backup Service (scheduled pg_dump) ──────────
  backup:
    build: .
    container_name: diggai-backup
    profiles: ["backup"]
    entrypoint: ["node", "dist/server/jobs/backupWorker.js"]
    env_file: .env.production
    environment:
      - DATABASE_URL=postgresql://diggai:${POSTGRES_PASSWORD}@postgres:5432/anamnese_prod
      - BACKUP_DIR=/backups
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backups:/backups
    restart: unless-stopped
    networks:
      - diggai-network

  # ─── Modul 6: TI-Konnektor Reverse Proxy ──────────────────
  ti-proxy:
    image: nginx:1.27-alpine
    container_name: diggai-ti-proxy
    profiles: ["ti"]
    ports:
      - "8585:8585"
    volumes:
      - ./docker/ti-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ti-certs:/etc/nginx/ti-certs:ro
    restart: unless-stopped
    networks:
      - diggai-network

  # ─── Modul 6: Ollama Local LLM ────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: diggai-ollama
    profiles: ["llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - diggai-network

  # ─── UAE Regional Deployment (Abu Dhabi / UAE North) ──────────────────────
  app-uae:
    build: .
    container_name: diggai-app-uae
    profiles: ["uae"]
    env_file: .env.uae
    environment:
      - DATA_RESIDENCY_REGION=uae
      - CORS_EXTRA_ORIGINS=https://*.doh.gov.ae,https://*.m42.ae
    ports:
      - "3002:3001"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - diggai-network

  # ─── Jordan Regional Deployment (Sarah Speciality Hospital, Mafraq) ────────
  app-jordan:
    build: .
    container_name: diggai-app-jordan
    profiles: ["jordan"]
    env_file: .env.jordan
    environment:
      - DATA_RESIDENCY_REGION=jordan
      - CORS_EXTRA_ORIGINS=https://*.moh.gov.jo,https://*.jdhc.jo
    ports:
      - "3003:3001"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - diggai-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  uploads:
    driver: local
  backups:
    driver: local
  ollama_data:
    driver: local

networks:
  diggai-network:
    driver: bridge
