version: '3.9'

services:
  # ─── Express Backend ─────────────────────────────────────
  app:
    build: .
    container_name: diggai-app
    ports:
      - "3001:3001"
    env_file: .env.production
    environment:
      - DATABASE_URL=postgresql://diggai:${POSTGRES_PASSWORD}@postgres:5432/anamnese_prod
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads
    networks:
      - diggai-network

  # ─── PostgreSQL 16 ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: diggai-postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: anamnese_prod
      POSTGRES_USER: diggai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diggai -d anamnese_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - diggai-network

  # ─── Redis 7 (Token Blacklist + Queue) ────────────────────
  redis:
    image: redis:7-alpine
    container_name: diggai-redis
    volumes:
      - redisdata:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - diggai-network

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: diggai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - diggai-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  uploads:
    driver: local

networks:
  diggai-network:
    driver: bridge
