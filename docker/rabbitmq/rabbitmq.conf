# RabbitMQ Konfiguration für DiggAI
# Sicherheit: Management-UI nur auf localhost

# Netzwerk
listeners.tcp.default = 5672

# Management Plugin
management.listener.port = 15672
management.listener.ip   = 127.0.0.1

# Heartbeat (Verbindungs-Liveness)
heartbeat = 60

# Queue-Limits (verhindert Memory-Überlastung)
vm_memory_high_watermark.relative = 0.6
disk_free_limit.absolute = 500MB

# Logging
log.console = true
log.console.level = info

# Persist messages to disk (wichtig für Task-Durability)
queue_master_locator = min-masters
