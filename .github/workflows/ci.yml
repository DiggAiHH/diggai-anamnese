name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '22'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-jwt-secret-minimum-32-characters
      ENCRYPTION_KEY: 12345678901234567890123456789012
      ARZT_PASSWORD: test-arzt-password
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test?schema=public
      DATABASE_URL_PRACTICE: postgresql://postgres:postgres@localhost:5432/test?schema=public
      DATABASE_URL_COMPANY: postgresql://postgres:postgres@localhost:5432/test?schema=public
      DATABASE_URL_AUTHORITY: postgresql://postgres:postgres@localhost:5432/test?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc -b

      - name: TypeScript check (server)
        run: npx tsc -p tsconfig.server.json --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

      - name: Prisma generate
        run: npx prisma generate

      - name: i18n completeness check
        run: node scripts/generate-i18n.ts

      - name: Prisma migration status
        env:
          DATABASE_URL: "${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/test?schema=public' }}"
        run: npx prisma migrate status || echo "Warning - Could not check migration status (no DB in CI)"

      - name: Security audit (high+)
        run: npm audit --audit-level=high

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
