name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '22'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-jwt-secret-minimum-32-characters
      ENCRYPTION_KEY: 12345678901234567890123456789012
      ARZT_PASSWORD: test-arzt-password
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test?schema=public
      DATABASE_URL_PRACTICE: postgresql://postgres:postgres@localhost:5432/test?schema=public
      DATABASE_URL_COMPANY: postgresql://postgres:postgres@localhost:5432/test?schema=public
      DATABASE_URL_AUTHORITY: postgresql://postgres:postgres@localhost:5432/test?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc -b

      - name: TypeScript check (server)
        run: npx tsc -p tsconfig.server.json --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

      # Class-I-Schutz: Bundle-Audit auf das frische dist/.
      # Greppt minified JS nach Class-IIa-Strings (triage, redFlag, aiSummary, ...).
      # Solange noch der Monolith gebaut wird, sind 19 erwartete Treffer ok —
      # daher hier ohne --strict; nach Phase 4 (Capture-only-Build) auf
      # `npm run audit:capture` umstellen und einen Treffer als Build-Failure werten.
      # Anker: DiggAi-Restrukturierungs-Plan v1.0 §6.1, Open-Items-Tracker B6.
      - name: Bundle-Audit (Class-IIa-Strings im Capture-Bundle)
        run: npm run audit:bundle
        continue-on-error: true

      # Class-I-Hard-Gate: Marketing-Strings in Source-Files prüfen.
      # K22: marketing-audit.cjs als Hard-Gate — fängt jede Class-IIa-Drift
      # in marketing-relevanten Strings mechanisch ab, bevor sie deployed wird.
      # Anker: DiggAi-Open-Items-Tracker K22.
      - name: Marketing-Audit Class-I Hard-Gate
        run: node scripts/marketing-audit.cjs

      - name: Prisma generate
        run: npx prisma generate

      - name: i18n completeness check
        run: node scripts/generate-i18n.ts

      - name: Prisma migration status
        env:
          DATABASE_URL: "${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/test?schema=public' }}"
        run: npx prisma migrate status || echo "Warning - Could not check migration status (no DB in CI)"

      - name: Security audit (high+)
        run: npm audit --audit-level=high

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
