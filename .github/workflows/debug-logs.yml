name: Debug VPS Logs

on:
  workflow_dispatch:

jobs:
  get-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Get app container logs and DB info
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            echo "=== docker ps ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
            echo ""
            echo "=== DB: list tenants ==="
            docker exec diggai-postgres psql -U diggai -d anamnese_prod -c 'SELECT id, subdomain, name, status FROM "Tenant" LIMIT 20;' 2>&1 || echo "psql failed"
            echo ""
            echo "=== DB: list staff users (no passwords) ==="
            docker exec diggai-postgres psql -U diggai -d anamnese_prod -c 'SELECT id, username, role, "tenantId" FROM "ArztUser" LIMIT 20;' 2>&1 || echo "psql failed"
            echo ""
            echo "=== diggai-app logs (last 50 lines) ==="
            docker logs diggai-app --tail 50 2>&1 || echo "No diggai-app container found"
