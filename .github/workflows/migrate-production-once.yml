name: Migrate Production DB (one-time)

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install migration dependencies only
        run: |
          npm install prisma@^6.19.2 @prisma/client@^6.19.2 tsx@^4.21.0 dotenv@^17.3.1 bcryptjs@^3.0.3 @types/bcryptjs --no-save --legacy-peer-deps

      - name: Run production migration
        env:
          SUPABASE_DB_PASS: ${{ secrets.SUPABASE_DB_PASS }}
          ARZT_PASSWORD: ${{ secrets.ARZT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          # Build DATABASE_URL with Python-safe URL encoding (avoids %40 double-encode issues)
          ENCODED_PASS=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=''))" "$SUPABASE_DB_PASS")
          export DATABASE_URL="postgresql://postgres.oanbmfztnzjvkumzpnfb:${ENCODED_PASS}@aws-1-eu-central-1.pooler.supabase.com:5432/postgres"
          bash scripts/migrate-production.sh
