name: API Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - 'prisma/**'
      - '.github/workflows/test.yml'
      - 'package*.json'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - 'prisma/**'
      - 'package*.json'

env:
  NODE_VERSION: '22'

jobs:
  unit-tests:
    name: Server Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Server Unit Tests
        run: npm run test:server

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-unit
          path: test-results/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
      JWT_SECRET: test-jwt-secret-minimum-32-characters
      ENCRYPTION_KEY: exactly-32-chars-for-aes256!!
      NODE_ENV: test
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run Integration Tests
        run: npm run test:server -- --reporter=verbose

      - name: Generate Coverage Report
        run: npm run test:server -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-integration
          path: test-results/

  coverage-threshold:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: [unit-tests]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Coverage Check
        run: |
          npm run test:server -- --coverage --coverage.thresholds.statements=80 --coverage.thresholds.branches=70 --coverage.thresholds.functions=80 --coverage.thresholds.lines=80
