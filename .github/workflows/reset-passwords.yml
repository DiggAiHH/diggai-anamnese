name: Reset DB Passwords

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Reset account lockout and passwords via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            echo "=== Reset account lockout (SQL) ==="
            docker exec diggai-postgres psql -U diggai -d anamnese_prod \
              -c 'UPDATE "ArztUser" SET "failedLoginAttempts" = 0, "lockedUntil" = NULL;' 2>&1

            echo "=== Reset passwords via app container ==="
            docker exec diggai-app node --import tsx --input-type=module << 'NODESCRIPT'
import bcrypt from 'bcryptjs';
import { PrismaClient } from '@prisma/client';
const prisma = new PrismaClient();
try {
  const mfaHash = await bcrypt.hash('mfa1234', 10);
  const arztHash = await bcrypt.hash('arzt1234', 10);
  const adminHash = await bcrypt.hash('praxis2026', 10);
  await prisma.arztUser.updateMany({ where: { username: 'mfa' }, data: { passwordHash: mfaHash, failedLoginAttempts: 0, lockedUntil: null, isActive: true } });
  await prisma.arztUser.updateMany({ where: { username: 'arzt' }, data: { passwordHash: arztHash, failedLoginAttempts: 0, lockedUntil: null, isActive: true } });
  await prisma.arztUser.updateMany({ where: { username: 'admin' }, data: { passwordHash: adminHash, failedLoginAttempts: 0, lockedUntil: null, isActive: true } });
  console.log('OK: mfa=mfa1234 arzt=arzt1234 admin=praxis2026');
} finally { await prisma.$disconnect(); }
NODESCRIPT

            echo "=== Verify after reset ==="
            docker exec diggai-postgres psql -U diggai -d anamnese_prod \
              -c 'SELECT username, role, "isActive", "failedLoginAttempts", "lockedUntil" FROM "ArztUser";' 2>&1
