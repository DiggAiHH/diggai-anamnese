name: Reset DB Passwords

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Reset account lockout and passwords via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            echo "=== Reset account lockout via SQL ==="
            docker exec diggai-postgres psql -U diggai -d anamnese_prod \
              -c 'UPDATE "ArztUser" SET "failedLoginAttempts" = 0, "lockedUntil" = NULL;'
            echo ""
            echo "=== Reset passwords via node ==="
            docker exec diggai-app node --input-type=module -e "
            import bcrypt from 'bcryptjs';
            import { PrismaClient } from '@prisma/client';
            const p = new PrismaClient();
            try {
              const mh = await bcrypt.hash('mfa1234', 10);
              const ah = await bcrypt.hash('arzt1234', 10);
              const adh = await bcrypt.hash('praxis2026', 10);
              await p.arztUser.updateMany({where:{username:'mfa'},data:{passwordHash:mh,failedLoginAttempts:0,lockedUntil:null,isActive:true}});
              await p.arztUser.updateMany({where:{username:'arzt'},data:{passwordHash:ah,failedLoginAttempts:0,lockedUntil:null,isActive:true}});
              await p.arztUser.updateMany({where:{username:'admin'},data:{passwordHash:adh,failedLoginAttempts:0,lockedUntil:null,isActive:true}});
              console.log('OK: mfa=mfa1234 arzt=arzt1234 admin=praxis2026');
            } finally { await p.\$disconnect(); }
            " 2>&1
            echo ""
            echo "=== Verify after reset ==="
            docker exec diggai-postgres psql -U diggai -d anamnese_prod \
              -c 'SELECT username, role, "isActive", "failedLoginAttempts", "lockedUntil" FROM "ArztUser";'
