name: Lighthouse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd anamnese-app
          npm ci

      - name: Build application
        run: |
          cd anamnese-app
          npm run build

      - name: Run Lighthouse CI - Desktop
        run: |
          npm install -g @lhci/cli@0.14.x
          cd anamnese-app
          lhci autorun --config=lighthouserc.js
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Run Lighthouse CI - Mobile
        run: |
          cd anamnese-app
          lhci autorun --config=lighthouserc.js --preset=mobile
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results-${{ github.run_id }}
          path: |
            anamnese-app/.lighthouseci/
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const lighthouseDir = 'anamnese-app/.lighthouseci';
            const files = fs.readdirSync(lighthouseDir);
            const jsonFiles = files.filter(f => f.endsWith('.json') && f.startsWith('lhr-'));
            
            let comment = '## Lighthouse Performance Report\n\n';
            comment += '| URL | Performance | Accessibility | Best Practices | SEO | PWA |\n';
            comment += '|-----|-------------|---------------|----------------|-----|-----|\n';
            
            for (const file of jsonFiles) {
              const lhr = JSON.parse(fs.readFileSync(path.join(lighthouseDir, file), 'utf8'));
              const url = lhr.finalUrl;
              const perf = Math.round(lhr.categories.performance.score * 100);
              const a11y = Math.round(lhr.categories.accessibility.score * 100);
              const bp = Math.round(lhr.categories['best-practices'].score * 100);
              const seo = Math.round(lhr.categories.seo.score * 100);
              const pwa = lhr.categories.pwa ? Math.round(lhr.categories.pwa.score * 100) : 'N/A';
              
              comment += `| ${url} | ${perf} | ${a11y} | ${bp} | ${seo} | ${pwa} |\n`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
