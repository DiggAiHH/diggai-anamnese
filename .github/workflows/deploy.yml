name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Test ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc -b

      - name: Build frontend
        run: npm run build

      - name: Lint
        run: npm run lint

  # ─── Deploy to VPS ─────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e

            # Method 1: docker compose ls - parse ConfigFiles with awk
            REPO_PATH=$(docker compose ls --format json 2>/dev/null \
              | grep -oi '"ConfigFiles":"[^"]*"' \
              | grep -i "anamnese\|diggai" \
              | head -1 \
              | sed 's|"ConfigFiles":"||;s|"||g' \
              | sed 's|/[^/]*$||' \
              || true)

            # Method 2: docker inspect - try several likely container names
            if [ -z "$REPO_PATH" ] || [ ! -d "$REPO_PATH" ]; then
              for CNAME in diggai-anamnese-master-app-1 anamnese-master-app-1 anamnese-app-1; do
                TMP=$(docker inspect "$CNAME" 2>/dev/null \
                  | grep -o '"com.docker.compose.project.working_dir":"[^"]*"' \
                  | head -1 \
                  | sed 's|.*":"||;s|"||g' \
                  || true)
                if [ -n "$TMP" ] && [ -d "$TMP" ]; then REPO_PATH="$TMP"; break; fi
              done
            fi

            # Method 3: search for .git dirs whose remote points to our repo
            if [ -z "$REPO_PATH" ] || [ ! -d "$REPO_PATH" ]; then
              while IFS= read -r gd; do
                dir=$(dirname "$gd")
                if git -C "$dir" remote -v 2>/dev/null | grep -q "diggai-anamnese"; then
                  REPO_PATH="$dir"; break
                fi
              done < <(find / -maxdepth 7 -name ".git" -type d \
                -not -path "*/proc/*" -not -path "*/sys/*" -not -path "*/dev/*" \
                2>/dev/null)
            fi

            # Method 4: find docker-compose.yml mentioning anamnese
            if [ -z "$REPO_PATH" ] || [ ! -d "$REPO_PATH" ]; then
              REPO_PATH=$(find / -maxdepth 7 -name "docker-compose.yml" \
                -not -path "*/proc/*" -not -path "*/sys/*" -not -path "*/dev/*" \
                2>/dev/null | xargs grep -l "anamnese" 2>/dev/null \
                | head -1 | xargs -I{} dirname {} 2>/dev/null || true)
            fi

            # Abort with diagnostics so we can determine the real path
            if [ -z "$REPO_PATH" ] || [ ! -d "$REPO_PATH" ]; then
              echo "ERROR: Could not locate repo. Diagnostic info:"
              docker ps 2>/dev/null || true
              docker compose ls 2>/dev/null || true
              find / -maxdepth 5 -name "docker-compose.yml" \
                -not -path "*/proc/*" -not -path "*/sys/*" 2>/dev/null || true
              exit 1
            fi

            echo ">>> Repo path: $REPO_PATH"

            # Pull latest code
            echo "Pulling latest changes..."
            git -C "$REPO_PATH" pull origin master

            cd "$REPO_PATH"

            # Refresh SSL certs if due
            echo "Renewing SSL certs if needed..."
            sudo certbot renew --quiet 2>/dev/null || true
            if [ -f /etc/letsencrypt/live/api.diggai.de/fullchain.pem ]; then
              cp /etc/letsencrypt/live/api.diggai.de/fullchain.pem docker/certs/
              cp /etc/letsencrypt/live/api.diggai.de/privkey.pem   docker/certs/
            fi

            echo "Building and starting containers..."
            docker compose up -d --build --remove-orphans

            echo "Running database migrations..."
            docker compose exec -T app npx prisma migrate deploy 2>/dev/null || \
              echo "Migration step skipped (no migration folder — running schema push instead)" && \
              docker compose exec -T app npx prisma db push --accept-data-loss 2>/dev/null || true

            echo "Health check..."
            sleep 10
            curl -sf http://localhost:3001/api/health || (echo "Health check failed!" && exit 1)

            echo "Deployment successful!"
