name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Test ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc -b

      - name: Build frontend
        run: npm run build

      - name: Lint
        run: npm run lint

  # ─── Deploy to VPS ─────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e

            # Primary: use known repo path (confirmed via docker compose ls diagnostic)
            REPO_PATH="/opt/${{ secrets.VPS_USER }}/repo"

            # Fallback 1: docker compose ls table output - extract path from CONFIG FILES column
            if [ ! -d "$REPO_PATH" ]; then
              REPO_PATH=$(docker compose ls 2>/dev/null \
                | tail -n +2 \
                | awk '{print $NF}' \
                | tr ',' '\n' \
                | grep -i "docker-compose.yml" \
                | head -1 \
                | xargs -I{} dirname {} 2>/dev/null || true)
            fi

            # Fallback 2: docker inspect the app container
            if [ -z "$REPO_PATH" ] || [ ! -d "$REPO_PATH" ]; then
              for CNAME in $(docker ps --format '{{.Names}}' 2>/dev/null); do
                TMP=$(docker inspect "$CNAME" 2>/dev/null \
                  | grep -o '"com.docker.compose.project.working_dir":"[^"]*"' \
                  | head -1 \
                  | sed 's|.*":"||;s|"||g' || true)
                if [ -n "$TMP" ] && [ -d "$TMP" ]; then REPO_PATH="$TMP"; break; fi
              done
            fi

            if [ -z "$REPO_PATH" ] || [ ! -d "$REPO_PATH" ]; then
              echo "ERROR: Repo not found. docker compose ls output:"
              docker compose ls 2>&1 || true
              exit 1
            fi

            echo ">>> Repo path: $REPO_PATH"

            # Pull latest code
            echo "Pulling latest changes..."
            git -C "$REPO_PATH" pull origin master

            cd "$REPO_PATH"

            # Refresh SSL certs if due
            echo "Renewing SSL certs if needed..."
            sudo certbot renew --quiet 2>/dev/null || true
            if [ -f /etc/letsencrypt/live/api.diggai.de/fullchain.pem ]; then
              cp /etc/letsencrypt/live/api.diggai.de/fullchain.pem docker/certs/
              cp /etc/letsencrypt/live/api.diggai.de/privkey.pem   docker/certs/
            fi

            echo "Building and starting containers..."
            docker compose up -d --build --remove-orphans

            echo "Running database migrations..."
            docker compose exec -T app npx prisma migrate deploy 2>/dev/null || \
              echo "Migration step skipped (no migration folder — running schema push instead)" && \
              docker compose exec -T app npx prisma db push --accept-data-loss 2>/dev/null || true

            echo "Health check..."
            sleep 10
            curl -sf http://localhost:3001/api/health || (echo "Health check failed!" && exit 1)

            echo "Deployment successful!"
