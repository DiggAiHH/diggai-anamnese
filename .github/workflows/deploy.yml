name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Test ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc -b

      - name: Build frontend
        run: npm run build

      - name: Lint
        run: npm run lint

  # ─── Deploy to VPS ─────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e

            # Get path from docker inspect label (no Go templates, no ANSI, no -d test)
            CONTAINER_ID=$(docker ps -q | head -1)
            REPO_PATH=$(docker inspect "$CONTAINER_ID" \
              | grep '"com.docker.compose.project.working_dir"' \
              | head -1 \
              | sed 's/.*": "\([^"]*\)".*/\1/' \
              | tr -d '[:space:]')

            # Fallback: docker compose ls --format json
            if [ -z "$REPO_PATH" ]; then
              COMPOSE_FILE=$(docker compose ls --format json 2>/dev/null \
                | tr ',' '\n' \
                | grep 'ConfigFiles' \
                | sed 's/.*ConfigFiles":"\([^",]*\).*/\1/' \
                | head -1 || true)
              REPO_PATH=$(dirname "$COMPOSE_FILE" 2>/dev/null || true)
            fi

            if [ -z "$REPO_PATH" ]; then
              echo "ERROR: Could not find repo path"; exit 1
            fi

            echo ">>> Repo path: $REPO_PATH"

            # Pull latest code (git -C works even without cd permissions)
            echo "Pulling latest changes..."
            git -C "$REPO_PATH" pull origin master

            cd "$REPO_PATH"

            # Refresh SSL certs if due
            echo "Renewing SSL certs if needed..."
            sudo certbot renew --quiet 2>/dev/null || true
            if [ -f /etc/letsencrypt/live/api.diggai.de/fullchain.pem ]; then
              cp /etc/letsencrypt/live/api.diggai.de/fullchain.pem docker/certs/
              cp /etc/letsencrypt/live/api.diggai.de/privkey.pem   docker/certs/
            fi

            echo "Building and starting containers..."
            docker compose up -d --build --remove-orphans

            echo "Running database migrations..."
            docker compose exec -T app npx prisma migrate deploy 2>/dev/null || \
              echo "Migration step skipped (no migration folder — running schema push instead)" && \
              docker compose exec -T app npx prisma db push --accept-data-loss 2>/dev/null || true

            echo "Health check..."
            sleep 10
            curl -sf http://localhost:3001/api/health || (echo "Health check failed!" && exit 1)

            echo "Deployment successful!"
