name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Test ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc -b

      - name: Build frontend
        run: npm run build

      - name: Lint
        run: npm run lint

  # ─── Deploy to VPS ─────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: GITHUB_TOKEN
          script: |
            set -e

            # Get repo path from docker inspect labels
            CONTAINER_ID=$(docker ps -q | head -1)
            REPO_PATH=$(docker inspect "$CONTAINER_ID" \
              | grep '"com.docker.compose.project.working_dir"' \
              | head -1 \
              | sed 's/.*": "\([^"]*\)".*/\1/' \
              | tr -d '[:space:]')

            if [ -z "$REPO_PATH" ]; then
              echo "ERROR: Cannot find repo path"; exit 1
            fi

            echo ">>> Repo: $REPO_PATH"

            PARENT=$(dirname "$REPO_PATH")
            UID_GID="$(id -u):$(id -g)"
            # Build clone URL using GITHUB_TOKEN (passed via envs, available in this shell)
            CLONE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/DiggAiHH/diggai-anamnese.git"

            # Check if repo exists (run inside docker container which runs as root)
            REPO_EXISTS=$(docker run --rm \
              -v "${PARENT}:${PARENT}" \
              alpine sh -c "test -d '${REPO_PATH}/.git' && echo yes || echo no" 2>/dev/null || echo no)

            if [ "$REPO_EXISTS" != "yes" ]; then
              echo "Repo missing — cloning fresh..."
              docker run --rm \
                -v "${PARENT}:${PARENT}" \
                -e "CLONE_URL=${CLONE_URL}" \
                -e "REPO_PATH=${REPO_PATH}" \
                -e "UID_GID=${UID_GID}" \
                alpine sh -c '
                  apk add --no-cache git > /dev/null 2>&1
                  mkdir -p "$REPO_PATH"
                  git clone --depth=50 "$CLONE_URL" "$REPO_PATH"
                  chown -R $UID_GID "$REPO_PATH"
                '
            else
              echo "Pulling latest changes..."
              docker run --rm \
                -v "${PARENT}:${PARENT}" \
                -w "${REPO_PATH}" \
                -e "CLONE_URL=${CLONE_URL}" \
                alpine sh -c '
                  apk add --no-cache git > /dev/null 2>&1
                  git remote set-url origin "$CLONE_URL"
                  git pull origin master
                '
            fi

            # Restore .env.production if missing (e.g. after fresh clone)
            # Strategy: backup file outside repo → running container env → empty fallback
            ENV_BACKUP="${PARENT}/.env.production.bak"
            if [ ! -f "${REPO_PATH}/.env.production" ]; then
              if [ -f "$ENV_BACKUP" ]; then
                echo "Restoring .env.production from backup..."
                cp "$ENV_BACKUP" "${REPO_PATH}/.env.production"
              else
                echo "No backup found — extracting env from running app container..."
                APP_CTR=$(docker ps --format '{{.Names}}' | grep -- '-app$' | head -1)
                if [ -n "$APP_CTR" ]; then
                  docker inspect "$APP_CTR" \
                    --format '{{range .Config.Env}}{{println .}}{{end}}' \
                    > "${REPO_PATH}/.env.production"
                  echo "Restored $(wc -l < ${REPO_PATH}/.env.production) env vars from container"
                else
                  echo "WARNING: no app container found; creating empty .env.production"
                  touch "${REPO_PATH}/.env.production"
                fi
              fi
            fi
            # Always refresh the backup so future fresh-clones can restore it
            cp "${REPO_PATH}/.env.production" "$ENV_BACKUP" 2>/dev/null || true

            # SSL cert renewal (best-effort)
            certbot renew --quiet 2>/dev/null || true

            # Include override.yml if present
            OVERRIDE_FLAG=""
            if docker run --rm -v "${PARENT}:${PARENT}" alpine \
                test -f "${REPO_PATH}/docker-compose.override.yml" 2>/dev/null; then
              OVERRIDE_FLAG="-f ${REPO_PATH}/docker-compose.override.yml"
            fi
            DC="docker compose -f ${REPO_PATH}/docker-compose.yml ${OVERRIDE_FLAG} --project-directory ${REPO_PATH}"

            echo "Building and starting containers..."
            $DC up -d --build --remove-orphans

            echo "Running database migrations..."
            $DC exec -T app npx prisma migrate deploy 2>/dev/null || \
              $DC exec -T app npx prisma db push --accept-data-loss 2>/dev/null || true

            echo "Health check..."
            sleep 10
            curl -sf http://localhost:3001/api/health || (echo "Health check failed!" && exit 1)

            echo "Deployment successful!"
