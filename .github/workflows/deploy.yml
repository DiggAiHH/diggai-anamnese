name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Test ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc -b

      - name: Build frontend
        run: npm run build

      - name: Lint
        run: npm run lint

  # ─── Deploy to VPS ─────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: GITHUB_TOKEN
          script: |
            set -e

            # Resolve repo path with a safe production-first fallback.
            # The docker label can point to an unrelated project on shared hosts.
            DEFAULT_REPO_PATH="/opt/diggai/anamnese-app"
            CONTAINER_ID=$(docker ps -q | head -1)
            DERIVED_REPO_PATH=""
            if [ -n "$CONTAINER_ID" ]; then
              DERIVED_REPO_PATH=$(docker inspect "$CONTAINER_ID" \
                | grep '"com.docker.compose.project.working_dir"' \
                | head -1 \
                | sed 's/.*": "\([^"]*\)".*/\1/' \
                | tr -d '[:space:]')
            fi

            if [ -f "${DEFAULT_REPO_PATH}/docker-compose.yml" ]; then
              REPO_PATH="$DEFAULT_REPO_PATH"
            elif [ -n "$DERIVED_REPO_PATH" ] && [ -f "${DERIVED_REPO_PATH}/docker-compose.yml" ]; then
              REPO_PATH="$DERIVED_REPO_PATH"
            elif [ -n "$DERIVED_REPO_PATH" ]; then
              REPO_PATH="$DERIVED_REPO_PATH"
            else
              REPO_PATH="$DEFAULT_REPO_PATH"
            fi

            if [ -z "$REPO_PATH" ]; then
              echo "ERROR: Cannot resolve repo path"; exit 1
            fi

            echo ">>> Repo: $REPO_PATH"

            PARENT=$(dirname "$REPO_PATH")
            UID_GID="$(id -u):$(id -g)"
            # Build clone URL using GITHUB_TOKEN (passed via envs, available in this shell)
            CLONE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/DiggAiHH/diggai-anamnese.git"

            # Check if repo exists (run inside docker container which runs as root)
            REPO_EXISTS=$(docker run --rm \
              -v "${PARENT}:${PARENT}" \
              alpine sh -c "test -d '${REPO_PATH}/.git' && echo yes || echo no" 2>/dev/null || echo no)

            if [ "$REPO_EXISTS" != "yes" ]; then
              if [ -d "$REPO_PATH" ] && [ -n "$(ls -A "$REPO_PATH" 2>/dev/null)" ]; then
                echo "ERROR: Repo path exists but is not a git repository: $REPO_PATH"
                echo "       Refusing to clone into a non-empty directory."
                exit 1
              fi

              echo "Repo missing — cloning fresh..."
              docker run --rm \
                -v "${PARENT}:${PARENT}" \
                -e "CLONE_URL=${CLONE_URL}" \
                -e "REPO_PATH=${REPO_PATH}" \
                -e "UID_GID=${UID_GID}" \
                alpine sh -c '
                  set -e
                  apk add --no-cache git > /dev/null 2>&1
                  mkdir -p "$REPO_PATH"
                  git clone --depth=50 "$CLONE_URL" "$REPO_PATH"
                  chown -R $UID_GID "$REPO_PATH"
                '
            else
              echo "Pulling latest changes..."
              docker run --rm \
                -v "${PARENT}:${PARENT}" \
                -w "${REPO_PATH}" \
                -e "CLONE_URL=${CLONE_URL}" \
                alpine sh -c '
                  apk add --no-cache git > /dev/null 2>&1
                  git config --global --add safe.directory "*"
                  git remote set-url origin "$CLONE_URL"
                  git pull origin master
                '
            fi

            # Restore .env.production if missing (e.g. after fresh clone)
            # Strategy: backup file outside repo → running container env → empty fallback
            ENV_BACKUP="${PARENT}/.env.production.bak"
            if [ ! -f "${REPO_PATH}/.env.production" ]; then
              if [ -f "$ENV_BACKUP" ]; then
                echo "Restoring .env.production from backup..."
                cp "$ENV_BACKUP" "${REPO_PATH}/.env.production"
              else
                echo "No backup found — extracting env from running app container..."
                APP_CTR=$(docker ps --format '{{.Names}}' | grep -- '-app$' | head -1)
                if [ -n "$APP_CTR" ]; then
                  docker inspect "$APP_CTR" \
                    --format '{{range .Config.Env}}{{println .}}{{end}}' \
                    > "${REPO_PATH}/.env.production"
                  echo "Restored $(wc -l < ${REPO_PATH}/.env.production) env vars from container"
                else
                  echo "WARNING: no app container found; creating empty .env.production"
                  touch "${REPO_PATH}/.env.production"
                fi
              fi
            fi
            # Always refresh the backup so future fresh-clones can restore it
            cp "${REPO_PATH}/.env.production" "$ENV_BACKUP" 2>/dev/null || true

            # Verify critical env vars are present in .env.production
            if ! grep -q "^DATABASE_URL=" "${REPO_PATH}/.env.production" 2>/dev/null; then
              echo "ERROR: DATABASE_URL missing from .env.production!"
              echo "  Hint: Add DATABASE_URL=postgresql://diggai:<password>@postgres:5432/anamnese_prod"
              echo "  Current .env.production contents (redacted):"
              grep -v "SECRET\|KEY\|PASSWORD\|TOKEN" "${REPO_PATH}/.env.production" 2>/dev/null || echo "  (empty)"
              exit 1
            fi
            echo "DATABASE_URL found in .env.production ✓"

            # Strategy: use system nginx as reverse proxy to Docker app on port 3001.
            # We do NOT stop system nginx -- doing so kills the SSH session on this VPS.
            # Instead, write a vhost that proxies api.diggai.de to localhost:3001.
            echo "Configuring system nginx vhost for api.diggai.de..."
            echo "nginx config directory contents:"
            ls -la /etc/nginx/ 2>/dev/null || echo "  /etc/nginx not accessible"
            ls -la /etc/nginx/conf.d/ 2>/dev/null || echo "  /etc/nginx/conf.d not present"
            ls -la /etc/nginx/sites-available/ 2>/dev/null || echo "  /etc/nginx/sites-available not present"
            # Detect nginx config dir: prefer conf.d, fall back to sites-available (create if needed)
            if [ -d "/etc/nginx/conf.d" ]; then
              VHOST_CONF="/etc/nginx/conf.d/api.diggai.de.conf"
              echo "Using /etc/nginx/conf.d/ path"
            else
              mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled 2>/dev/null || true
              VHOST_CONF="/etc/nginx/sites-available/api.diggai.de"
              echo "Using /etc/nginx/sites-available/ path"
            fi
            printf '%s\n' \
              'server {' \
              '    listen 80;' \
              '    server_name api.diggai.de;' \
              '    location /.well-known/acme-challenge/ {' \
              '        root /var/www/html;' \
              '    }' \
              '    location / {' \
              '        proxy_pass http://127.0.0.1:3001;' \
              '        proxy_http_version 1.1;' \
              '        proxy_set_header Host $host;' \
              '        proxy_set_header X-Real-IP $remote_addr;' \
              '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' \
              '        proxy_set_header X-Forwarded-Proto $scheme;' \
              '        proxy_set_header Upgrade $http_upgrade;' \
              '        proxy_set_header Connection upgrade;' \
              '        proxy_read_timeout 90s;' \
              '    }' \
              '}' \
              > "$VHOST_CONF" 2>&1 || { echo "WARN: could not write vhost to $VHOST_CONF"; }
            echo "Wrote vhost config to $VHOST_CONF"
            # If using sites-available pattern, create symlink in sites-enabled
            if echo "$VHOST_CONF" | grep -q "sites-available"; then
              ln -sf "$VHOST_CONF" "/etc/nginx/sites-enabled/api.diggai.de" 2>/dev/null || true
            fi
            # Test + reload nginx (nginx -s reload is safe, does not kill master or SSH)
            if nginx -t 2>/dev/null; then
              nginx -s reload 2>/dev/null && echo "System nginx reloaded" || echo "nginx reload: n/a"
            else
              echo "nginx -t failed — check config"
              nginx -t 2>&1 || true
            fi
            echo "System nginx vhost write done"

            # Include override.yml if present
            OVERRIDE_FLAG=""
            if docker run --rm -v "${PARENT}:${PARENT}" alpine \
                test -f "${REPO_PATH}/docker-compose.override.yml" 2>/dev/null; then
              OVERRIDE_FLAG="-f ${REPO_PATH}/docker-compose.override.yml"
            fi
            if [ ! -f "${REPO_PATH}/docker-compose.yml" ]; then
              echo "ERROR: docker-compose.yml not found at ${REPO_PATH}"
              ls -la "${REPO_PATH}" || true
              exit 1
            fi

            DC="docker compose --project-name diggai -f ${REPO_PATH}/docker-compose.yml ${OVERRIDE_FLAG} --project-directory ${REPO_PATH}"

            echo "Building app image..."
            $DC build app

            echo "Ensuring infrastructure is running (redis/postgres not recreated if healthy)..."
            # If redis/postgres are unhealthy (not just "not running"), stop them so compose
            # can recreate with updated config (e.g., after docker-compose.yml changes)
            REDIS_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' diggai-redis 2>/dev/null || echo missing)
            POSTGRES_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' diggai-postgres 2>/dev/null || echo missing)
            if [ "$REDIS_HEALTH" = "unhealthy" ]; then
              echo "Redis unhealthy — stopping for config update..."
              docker stop diggai-redis 2>/dev/null || true
            fi
            if [ "$POSTGRES_HEALTH" = "unhealthy" ]; then
              echo "Postgres unhealthy — stopping for config update..."
              docker stop diggai-postgres 2>/dev/null || true
            fi

            REDIS_STATUS=$(docker inspect --format='{{.State.Status}}' diggai-redis 2>/dev/null || echo missing)
            POSTGRES_STATUS=$(docker inspect --format='{{.State.Status}}' diggai-postgres 2>/dev/null || echo missing)
            echo "Ensuring postgres/redis are on the diggai network (redis=$REDIS_STATUS postgres=$POSTGRES_STATUS)..."
            # The compose project 'diggai' uses network 'diggai-network' → full Docker name: diggai_diggai-network
            COMPOSE_NET="diggai_diggai-network"
            # Ensure the network exists (compose creates it, but may not exist yet on first deploy)
            docker network create "$COMPOSE_NET" 2>/dev/null || true
            # Use network connect (not compose up) to avoid name conflicts with cross-project containers.
            # Disconnect first to ensure aliases are re-applied correctly.
            if [ "$REDIS_STATUS" = "running" ]; then
              docker network disconnect "$COMPOSE_NET" diggai-redis 2>/dev/null || true
              docker network connect --alias redis "$COMPOSE_NET" diggai-redis
              echo "  diggai-redis: connected to $COMPOSE_NET (alias: redis)"
            else
              echo "  diggai-redis missing/stopped — starting via compose..."
              $DC up -d redis
            fi
            if [ "$POSTGRES_STATUS" = "running" ]; then
              docker network disconnect "$COMPOSE_NET" diggai-postgres 2>/dev/null || true
              docker network connect --alias postgres "$COMPOSE_NET" diggai-postgres
              echo "  diggai-postgres: connected to $COMPOSE_NET (alias: postgres)"
            else
              echo "  diggai-postgres missing/stopped — starting via compose..."
              $DC up -d postgres
            fi

            echo "Waiting for redis/postgres to be healthy (max 120s)..."
            ELAPSED=0
            while [ $ELAPSED -lt 120 ]; do
              R=$(docker inspect --format='{{.State.Health.Status}}' diggai-redis 2>/dev/null || echo missing)
              P=$(docker inspect --format='{{.State.Health.Status}}' diggai-postgres 2>/dev/null || echo missing)
              [ "$R" = "healthy" ] && [ "$P" = "healthy" ] && { echo "Infrastructure healthy"; break; }
              echo "  redis=$R postgres=$P (${ELAPSED}s/120s)"
              sleep 5; ELAPSED=$((ELAPSED + 5))
            done
            R=$(docker inspect --format='{{.State.Health.Status}}' diggai-redis 2>/dev/null || echo missing)
            P=$(docker inspect --format='{{.State.Health.Status}}' diggai-postgres 2>/dev/null || echo missing)
            [ "$R" != "healthy" ] && { echo "ERROR: Redis unhealthy: $R"; exit 1; }
            [ "$P" != "healthy" ] && { echo "ERROR: Postgres unhealthy: $P"; exit 1; }

            echo "Deploying app container..."
            # Avoid container-name conflicts from legacy compose project labels on shared hosts.
            if docker ps -a --format '{{.Names}}' | grep -qx 'diggai-app'; then
              docker rm -f diggai-app 2>/dev/null || true
            fi
            $DC up -d --force-recreate --no-deps app

            echo "Health check (waiting for app startup, max 90s)..."
            APP_OK=0
            for i in $(seq 1 36); do
              sleep 5
              if curl -sf http://localhost:3001/api/health >/dev/null 2>&1; then
                echo "App healthy after $((i*5))s"
                APP_OK=1
                break
              fi
              APP_STATE=$(docker inspect --format='{{.State.Status}}' diggai-app 2>/dev/null || echo missing)
              echo "  waiting... ($((i*5))s/180s) app=$APP_STATE"
            done
            if [ "$APP_OK" != "1" ]; then
              echo "=== APP CONTAINER LOGS (last 100 lines) ==="
              docker logs diggai-app --tail 100 2>&1 || true
              echo "=== END APP LOGS ==="
              echo "Health check failed after 180s!"; exit 1
            fi

            echo "Deployment successful!"
