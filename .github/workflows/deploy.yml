name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Test ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc -b

      - name: Build frontend
        run: npm run build

      - name: Lint
        run: npm run lint

  # ─── Deploy to VPS ─────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e

            # Get path from docker inspect label (no Go templates, no ANSI)
            CONTAINER_ID=$(docker ps -q | head -1)
            REPO_PATH=$(docker inspect "$CONTAINER_ID" \
              | grep '"com.docker.compose.project.working_dir"' \
              | head -1 \
              | sed 's/.*": "\([^"]*\)".*/\1/' \
              | tr -d '[:space:]')

            if [ -z "$REPO_PATH" ]; then
              echo "ERROR: Cannot find repo path"; exit 1
            fi

            echo ">>> Repo path: $REPO_PATH"

            # Use sudo: SSH user may lack execute permission on repo directory
            # (sudo certbot already works, so passwordless sudo is configured)
            echo "Pulling latest changes..."
            sudo git -C "$REPO_PATH" pull origin master

            # Refresh SSL certs if due
            echo "Renewing SSL certs if needed..."
            sudo certbot renew --quiet 2>/dev/null || true
            if sudo test -f /etc/letsencrypt/live/api.diggai.de/fullchain.pem 2>/dev/null; then
              sudo cp /etc/letsencrypt/live/api.diggai.de/fullchain.pem "$REPO_PATH/docker/certs/" 2>/dev/null || true
              sudo cp /etc/letsencrypt/live/api.diggai.de/privkey.pem   "$REPO_PATH/docker/certs/" 2>/dev/null || true
            fi

            # Build and restart — use explicit -f + --project-directory to avoid needing cd
            echo "Building and starting containers..."
            OVERRIDE=""
            if sudo test -f "$REPO_PATH/docker-compose.override.yml" 2>/dev/null; then
              OVERRIDE="-f $REPO_PATH/docker-compose.override.yml"
            fi
            docker compose \
              -f "$REPO_PATH/docker-compose.yml" $OVERRIDE \
              --project-directory "$REPO_PATH" \
              up -d --build --remove-orphans

            # Run migrations
            echo "Running database migrations..."
            docker compose \
              -f "$REPO_PATH/docker-compose.yml" $OVERRIDE \
              --project-directory "$REPO_PATH" \
              exec -T app npx prisma migrate deploy 2>/dev/null || \
              docker compose \
              -f "$REPO_PATH/docker-compose.yml" $OVERRIDE \
              --project-directory "$REPO_PATH" \
              exec -T app npx prisma db push --accept-data-loss 2>/dev/null || true

            echo "Health check..."
            sleep 10
            curl -sf http://localhost:3001/api/health || (echo "Health check failed!" && exit 1)

            echo "Deployment successful!"
