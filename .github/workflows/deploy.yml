name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Test ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc -b

      - name: Build frontend
        run: npm run build

      - name: Lint
        run: npm run lint

  # ─── Deploy to VPS ─────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e

            # Get repo path from docker inspect labels
            CONTAINER_ID=$(docker ps -q | head -1)
            REPO_PATH=$(docker inspect "$CONTAINER_ID" \
              | grep '"com.docker.compose.project.working_dir"' \
              | head -1 \
              | sed 's/.*": "\([^"]*\)".*/\1/' \
              | tr -d '[:space:]')

            if [ -z "$REPO_PATH" ]; then
              echo "ERROR: Cannot find repo path"; exit 1
            fi

            echo ">>> Repo: $REPO_PATH"

            # Fix repo ownership via docker (daemon runs as root, can chown even
            # when SSH user has no direct access to the path)
            UID_GID="$(id -u):$(id -g)"
            PARENT=$(dirname "$REPO_PATH")
            echo "Fixing repo ownership for UID:GID $UID_GID ..."
            docker run --rm \
              -v "${PARENT}:${PARENT}" \
              alpine sh -c "chown -R ${UID_GID} ${REPO_PATH}"

            echo "Pulling latest changes..."
            git -C "$REPO_PATH" pull origin master

            # SSL cert renewal (best-effort)
            certbot renew --quiet 2>/dev/null || true

            # docker compose flags (include override.yml if present)
            OVERRIDE_FLAG=""
            if [ -f "$REPO_PATH/docker-compose.override.yml" ]; then
              OVERRIDE_FLAG="-f $REPO_PATH/docker-compose.override.yml"
            fi
            DC="docker compose -f $REPO_PATH/docker-compose.yml $OVERRIDE_FLAG --project-directory $REPO_PATH"

            echo "Building and starting containers..."
            $DC up -d --build --remove-orphans

            echo "Running database migrations..."
            $DC exec -T app npx prisma migrate deploy 2>/dev/null || \
              $DC exec -T app npx prisma db push --accept-data-loss 2>/dev/null || true

            echo "Health check..."
            sleep 10
            curl -sf http://localhost:3001/api/health || (echo "Health check failed!" && exit 1)

            echo "Deployment successful!"
