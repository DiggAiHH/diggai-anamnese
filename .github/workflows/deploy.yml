name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Test ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc -b

      - name: Build frontend
        run: npm run build

      - name: Lint
        run: npm run lint

  # ─── Deploy to VPS ─────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e

            # Find repo dir: locate directory containing BOTH docker-compose.yml
            # and docker-compose.override.yml (avoids ANSI/parsing issues entirely)
            REPO_PATH=""
            for base in /root /home /opt /srv /var/www; do
              [ -d "$base" ] || continue
              while IFS= read -r f; do
                d=$(dirname "$f")
                if [ -f "$d/docker-compose.override.yml" ]; then
                  REPO_PATH="$d"
                  break 2
                fi
              done < <(find "$base" -maxdepth 6 -name "docker-compose.yml" -not -path "*/node_modules/*" 2>/dev/null)
            done

            if [ -z "$REPO_PATH" ] || [ ! -d "$REPO_PATH" ]; then
              echo "=== DIAGNOSTIC: Cannot locate repo ==="
              echo "whoami: $(whoami)"
              echo "ls /home: $(ls /home 2>/dev/null || echo none)"
              echo "ls /opt:  $(ls /opt  2>/dev/null || echo none)"
              echo "ls /root: $(ls /root 2>/dev/null || echo none)"
              docker compose ls 2>&1 || true
              docker ps --format 'table {{.Names}}\t{{.Image}}' 2>&1 || true
              exit 1
            fi

            echo ">>> Repo path: $REPO_PATH"

            # Pull latest code
            echo "Pulling latest changes..."
            git -C "$REPO_PATH" pull origin master

            cd "$REPO_PATH"

            # Refresh SSL certs if due
            echo "Renewing SSL certs if needed..."
            sudo certbot renew --quiet 2>/dev/null || true
            if [ -f /etc/letsencrypt/live/api.diggai.de/fullchain.pem ]; then
              cp /etc/letsencrypt/live/api.diggai.de/fullchain.pem docker/certs/
              cp /etc/letsencrypt/live/api.diggai.de/privkey.pem   docker/certs/
            fi

            echo "Building and starting containers..."
            docker compose up -d --build --remove-orphans

            echo "Running database migrations..."
            docker compose exec -T app npx prisma migrate deploy 2>/dev/null || \
              echo "Migration step skipped (no migration folder — running schema push instead)" && \
              docker compose exec -T app npx prisma db push --accept-data-loss 2>/dev/null || true

            echo "Health check..."
            sleep 10
            curl -sf http://localhost:3001/api/health || (echo "Health check failed!" && exit 1)

            echo "Deployment successful!"
