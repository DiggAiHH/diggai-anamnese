# Railway deployment configuration for DiggAI Anamnese Backend
# Docs: https://docs.railway.app/reference/config-as-code

[build]
# Railway auto-detects the Dockerfile in the project root

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Required environment variables — set these in Railway Dashboard > Variables:
#
#   DATABASE_URL          = postgresql://prisma:PASSWORD@db.xxxx.supabase.co:5432/postgres
#   JWT_SECRET            = <min 32 chars random string>
#   ENCRYPTION_KEY        = <exactly 32 chars>
#   FRONTEND_URL          = https://diggai-drklaproth.netlify.app
#   API_PUBLIC_URL        = https://YOUR_PROJECT.up.railway.app/api
#   ARZT_PASSWORD         = <strong password for seeded doctor user>
#   NODE_ENV              = production
#   PORT                  = 3001
#   BACKEND_PROFILE       = monolith
#   LOG_LEVEL             = info
#
# Optional (graceful degradation without these):
#   REDIS_URL             = redis://...
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS / SMTP_FROM
#   VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY
#   OPENAI_API_KEY
#   SENTRY_DSN
