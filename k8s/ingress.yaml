# Ingress mit SSL (Let's Encrypt)
# Ersetzt Nginx auf Single VPS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: takios-ingress
  namespace: diggai-takios
  annotations:
    # NGINX Ingress Controller
    kubernetes.io/ingress.class: nginx
    
    # SSL/TLS mit Let's Encrypt
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # Rate Limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "5"
    
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://diggai-takios.netlify.app"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    
    # Security Headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      
spec:
  tls:
  - hosts:
    - api-takios.diggai.de
    secretName: takios-tls-secret
  rules:
  - host: api-takios.diggai.de
    http:
      paths:
      # Webhook Routes (ohne Rate Limiting)
      - path: /api/webhooks
        pathType: Prefix
        backend:
          service:
            name: core-api
            port:
              number: 80
      
      # API Routes
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: core-api
            port:
              number: 80
      
      # Default
      - path: /
        pathType: Prefix
        backend:
          service:
            name: core-api
            port:
              number: 80
---
# Certificate für Let's Encrypt
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: takios-cert
  namespace: diggai-takios
spec:
  secretName: takios-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - api-takios.diggai.de
