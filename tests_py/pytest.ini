[pytest]
# Base URL for the running Anamnese App (Vite dev server)
base_url = http://localhost:5173

# Marker definitions
markers =
    ui: UI layout and rendering tests
    fragenlogik: Question flow and conditional logic tests
    uebersetzung: Translation / i18n tests
    encryption: Encryption and security tests
    export: PDF/CSV export tests
    navigation: Navigation, back-button and state persistence tests
    smoke: Quick smoke tests

# Default Playwright options (headless for CI speed, use --headed for debugging)
addopts = --browser chromium
