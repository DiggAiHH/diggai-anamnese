# docker-compose.prod.yml — DiggAI Multi-Agenten-System Erweiterung
# Erweitert docker-compose.yml um RabbitMQ + Agent-Core (Python FastAPI)
#
# Starten mit:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile llm --profile agents up -d

version: '3.9'

services:
  # ─── RabbitMQ Message Broker ──────────────────────────────
  # Agenten-Kommunikation via AMQP
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: diggai-rabbitmq
    ports:
      - "5672:5672"       # AMQP
      - "15672:15672"     # Management UI (http://localhost:15672)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-diggai}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-changeme_in_production}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - diggai-network
    labels:
      - "diggai.service=message-broker"
      - "diggai.module=agents"

  # ─── Python Agent-Core (FastAPI) ─────────────────────────
  # Autonomer Multi-Agenten-Server mit Ollama-Integration
  agent-core:
    build:
      context: ./apps/agent-core
      dockerfile: Dockerfile
    container_name: diggai-agent-core
    profiles: ["agents"]
    ports:
      - "8000:8000"       # FastAPI HTTP + WebSocket
    environment:
      - OLLAMA_URL=http://ollama:11434
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-diggai}:${RABBITMQ_PASS:-changeme_in_production}@rabbitmq:5672/
      - DATABASE_URL=postgresql://diggai:${POSTGRES_PASSWORD}@postgres:5432/anamnese_prod
      - REDIS_URL=redis://redis:6379
      - AGENT_CORE_SECRET=${AGENT_CORE_SECRET:-change_this_secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - diggai-network
    labels:
      - "diggai.service=agent-core"
      - "diggai.module=agents"

  # ─── Ollama (aktiviert als Pflicht-Service in Produktion) ──
  # Überschreibt das "llm" Profile aus docker-compose.yml
  ollama:
    profiles: ["llm", "agents"]   # jetzt auch im agents-Profile aktiv
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2

  # ─── Express App: Agent-Core URL injizieren ───────────────
  app:
    environment:
      - AGENT_CORE_URL=http://agent-core:8000
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-diggai}:${RABBITMQ_PASS:-changeme_in_production}@rabbitmq:5672/

volumes:
  rabbitmq_data:
    driver: local
